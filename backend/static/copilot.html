<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KEYSER — AI Copilot</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3d;
    --accent: #7c3aed;
    --accent2: #a855f7;
    --accent-glow: rgba(124,58,237,0.25);
    --green: #10b981;
    --yellow: #f59e0b;
    --red: #ef4444;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --user-bubble: #1e1b4b;
    --ai-bubble: #12121a;
    --font: 'Inter', system-ui, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700;
    box-shadow: 0 0 16px var(--accent-glow);
  }
  .header-info h1 { font-size: 15px; font-weight: 600; letter-spacing: -.3px; }
  .header-info p  { font-size: 12px; color: var(--text-dim); }
  .status-dot {
    margin-left: auto;
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--green);
  }
  .status-dot::before {
    content: '';
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; } 50% { opacity: .4; }
  }

  /* ── Chat Area ── */
  #chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  /* ── Messages ── */
  .msg { display: flex; gap: 12px; max-width: 860px; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.ai   { align-self: flex-start; }

  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0; margin-top: 2px;
  }
  .msg.ai   .avatar { background: linear-gradient(135deg,var(--accent),var(--accent2)); }
  .msg.user .avatar { background: var(--surface2); border: 1px solid var(--border); }

  .bubble {
    border-radius: 14px;
    padding: 14px 18px;
    font-size: 14px;
    line-height: 1.65;
    max-width: 720px;
  }
  .msg.user .bubble {
    background: var(--user-bubble);
    border: 1px solid #312e81;
    border-radius: 14px 4px 14px 14px;
  }
  .msg.ai .bubble {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-radius: 4px 14px 14px 14px;
  }

  /* ── AI Response Cards ── */
  .copilot-card { display: flex; flex-direction: column; gap: 14px; }

  .card-summary {
    font-size: 15px; font-weight: 500; line-height: 1.5;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .card-section { }
  .card-section-title {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: .8px; color: var(--accent2); margin-bottom: 8px;
  }
  .card-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
  .card-list li {
    font-size: 13px; color: var(--text-dim);
    padding: 8px 12px;
    background: var(--surface2);
    border-radius: 8px;
    border-left: 3px solid var(--border);
    line-height: 1.5;
  }
  .card-list.insights li   { border-left-color: #7c3aed; }
  .card-list.opps li       { border-left-color: #10b981; }
  .card-list.actions li    { border-left-color: #f59e0b; }

  .card-footer {
    display: flex; gap: 12px; align-items: center;
    padding-top: 12px; border-top: 1px solid var(--border);
  }
  .confidence-badge {
    font-size: 11px; font-weight: 600; padding: 3px 10px;
    border-radius: 999px;
    text-transform: uppercase; letter-spacing: .5px;
  }
  .confidence-badge.high   { background: rgba(16,185,129,.15); color: var(--green); }
  .confidence-badge.medium { background: rgba(245,158,11,.15);  color: var(--yellow); }
  .confidence-badge.low    { background: rgba(239,68,68,.15);   color: var(--red); }
  .reasoning { font-size: 12px; color: var(--text-dim); line-height: 1.5; }

  /* ── Typing Indicator ── */
  .typing-indicator {
    display: flex; gap: 5px; align-items: center; padding: 4px 0;
  }
  .typing-indicator span {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent2);
    animation: bounce 1.2s infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: .2s; }
  .typing-indicator span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); }
    30% { transform: translateY(-7px); }
  }

  /* ── Welcome State ── */
  .welcome {
    margin: auto;
    text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 16px;
    opacity: .85;
  }
  .welcome-icon {
    width: 64px; height: 64px;
    background: linear-gradient(135deg,var(--accent),var(--accent2));
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    box-shadow: 0 0 40px var(--accent-glow);
  }
  .welcome h2 { font-size: 22px; font-weight: 700; }
  .welcome p  { font-size: 14px; color: var(--text-dim); max-width: 380px; line-height: 1.6; }

  .suggestions {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 8px;
  }
  .suggestion-btn {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text-dim); font-size: 12px; font-family: var(--font);
    padding: 8px 14px; border-radius: 999px; cursor: pointer;
    transition: all .2s;
  }
  .suggestion-btn:hover {
    background: var(--surface); border-color: var(--accent);
    color: var(--text); transform: translateY(-1px);
  }

  /* ── Input Bar ── */
  footer {
    flex-shrink: 0;
    padding: 16px 24px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
  }
  .input-wrap {
    display: flex; align-items: flex-end; gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 14px;
    transition: border-color .2s;
  }
  .input-wrap:focus-within { border-color: var(--accent); }

  #question {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text); font-size: 14px; font-family: var(--font);
    resize: none; line-height: 1.5; max-height: 120px;
  }
  #question::placeholder { color: var(--text-dim); }

  #send-btn {
    width: 36px; height: 36px; border-radius: 10px; border: none;
    background: linear-gradient(135deg,var(--accent),var(--accent2));
    color: #fff; cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: opacity .2s, transform .1s;
    flex-shrink: 0;
  }
  #send-btn:hover   { opacity: .85; }
  #send-btn:active  { transform: scale(.95); }
  #send-btn:disabled { opacity: .4; cursor: not-allowed; }

  .input-hint { font-size: 11px; color: var(--text-dim); margin-top: 8px; text-align: center; }

  /* ── Scrollbar ── */
  #chat-container::-webkit-scrollbar { width: 6px; }
  #chat-container::-webkit-scrollbar-track { background: transparent; }
  #chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">K</div>
  <div class="header-info">
    <h1>KEYSER AI Copilot</h1>
    <p>Market Intelligence · Powered by Gemma 3:4B</p>
  </div>
  <div class="status-dot" id="status-label">Ollama Online</div>
</header>

<div id="chat-container">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">🧠</div>
    <h2>AI Market Intelligence Copilot</h2>
    <p>Ask strategic questions about your competitors. I analyze real data from your intelligence engine to give you actionable insights.</p>
    <div class="suggestions">
      <button class="suggestion-btn" onclick="ask(this)">What is Zepto doing with pricing?</button>
      <button class="suggestion-btn" onclick="ask(this)">Where is the whitespace opportunity?</button>
      <button class="suggestion-btn" onclick="ask(this)">What should we do this week?</button>
      <button class="suggestion-btn" onclick="ask(this)">What are Blinkit's latest moves?</button>
      <button class="suggestion-btn" onclick="ask(this)">Compare Zepto vs Blinkit strategies</button>
    </div>
  </div>
</div>

<footer>
  <div class="input-wrap">
    <textarea id="question" rows="1" placeholder="Ask about competitor strategy, pricing, trends…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="sendMessage()" title="Send">➤</button>
  </div>
  <p class="input-hint">Enter to send · Shift+Enter for new line</p>
</footer>

<script>
const API = 'http://localhost:5001/api/copilot/chat';
let isLoading = false;

function ask(btn) {
  const q = btn.textContent.trim();
  document.getElementById('question').value = q;
  sendMessage();
}

function autoResize(ta) {
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function appendMessage(role, content) {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const container = document.getElementById('chat-container');
  const msg = document.createElement('div');
  msg.className = `msg ${role}`;
  msg.innerHTML = `
    <div class="avatar">${role === 'ai' ? '🧠' : '👤'}</div>
    <div class="bubble">${content}</div>
  `;
  container.appendChild(msg);
  container.scrollTop = container.scrollHeight;
  return msg;
}

function buildCopilotCard(data) {
  const confidence = (data.confidence || 'low').toLowerCase();
  const cfClass = ['high','medium'].includes(confidence) ? confidence : 'low';

  const listItems = (arr, cls) =>
    arr && arr.length
      ? `<ul class="card-list ${cls}">${arr.map(x => `<li>${escHtml(x)}</li>`).join('')}</ul>`
      : `<p style="color:var(--text-dim);font-size:13px">None available.</p>`;

  return `
    <div class="copilot-card">
      <div class="card-summary">${escHtml(data.summary || '')}</div>

      ${data.key_insights?.length ? `
      <div class="card-section">
        <div class="card-section-title">📊 Key Insights</div>
        ${listItems(data.key_insights, 'insights')}
      </div>` : ''}

      ${data.opportunities?.length ? `
      <div class="card-section">
        <div class="card-section-title">🚀 Opportunities</div>
        ${listItems(data.opportunities, 'opps')}
      </div>` : ''}

      ${data.recommended_actions?.length ? `
      <div class="card-section">
        <div class="card-section-title">⚡ Recommended Actions</div>
        ${listItems(data.recommended_actions, 'actions')}
      </div>` : ''}

      <div class="card-footer">
        <span class="confidence-badge ${cfClass}">Confidence: ${confidence}</span>
        ${data.reasoning ? `<span class="reasoning">${escHtml(data.reasoning)}</span>` : ''}
      </div>
    </div>`;
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function sendMessage() {
  if (isLoading) return;
  const ta = document.getElementById('question');
  const question = ta.value.trim();
  if (!question) return;

  ta.value = '';
  ta.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;
  isLoading = true;

  appendMessage('user', escHtml(question));

  // Typing indicator
  const typingMsg = appendMessage('ai',
    `<div class="typing-indicator"><span></span><span></span><span></span></div>`
  );

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: question })
    });
    const json = await res.json();

    typingMsg.querySelector('.bubble').innerHTML =
      json.success ? buildCopilotCard(json.data)
                   : `<span style="color:var(--red)">Error: ${escHtml(json.error)}</span>`;
  } catch(err) {
    typingMsg.querySelector('.bubble').innerHTML =
      `<span style="color:var(--red)">Connection error: ${escHtml(err.message)}</span>`;
  } finally {
    isLoading = false;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('chat-container').scrollTop = 9999;
  }
}
</script>
</body>
</html>
